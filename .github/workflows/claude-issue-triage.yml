name: Claude Issue Triage

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are triaging a new issue for Open Brain (OB1), an open-source
            persistent AI memory system. Read CLAUDE.md and CONTRIBUTING.md for
            full project context.

            Analyze this issue and:

            1. **Classify** — What type of contribution is this?
               - Bug report (something broken in an existing contribution)
               - Recipe idea (new data import or capability)
               - Schema idea (new database table extension)
               - Extension proposal (new guided build for the learning path)
               - Primitive proposal (new reusable concept guide)
               - Dashboard idea (new frontend template)
               - Integration idea (new MCP extension, webhook, or capture source)
               - Documentation improvement
               - Question (not a contribution, needs help)

            2. **Duplicate check** — Does this overlap with an existing open issue
               or a contribution that already exists in the repo? Check the
               issues list and the relevant category folder.

            3. **Scope fit** — Does this belong in OB1? It should relate to
               capturing, storing, retrieving, or processing thoughts in the
               Open Brain system. If it seems like it would be better as its
               own standalone project, say so politely.

            4. **Suggest labels** — Based on classification, suggest which labels
               should be applied (recipe, schema, extension, primitive, dashboard,
               integration, documentation, bug, question, good-first-issue).

            5. **Helpful response** — Post a welcoming, constructive comment:
               - Acknowledge the idea
               - If they used the blank template, point them to the right
                 specific template for better structure
               - If it's a recipe/schema/integration idea, link to
                 CONTRIBUTING.md's "What Goes Where" section
               - If it looks like a duplicate, link the existing issue
               - If it's a question, try to answer or point to docs/FAQ

            Be warm and encouraging. OB1 is a community project and every
            idea matters, even if it needs refinement.
